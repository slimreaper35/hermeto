services:
  nexus:
    container_name: hermeto-nexus
    image: docker.io/sonatype/nexus3:latest
    ports:
      - "8082:8081"
    volumes:
      - nexus-data:/nexus-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status/writable"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  nginx:
    container_name: hermeto-nexus-nginx
    image: docker.io/library/nginx:alpine
    ports:
      - "8443:443"
      - "8444:444"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
      - ../certificates/server.crt:/etc/nginx/certs/server.crt:ro,z
      - ../certificates/server.key:/etc/nginx/certs/server.key:ro,z
      - ../certificates/CA.crt:/etc/nginx/certs/CA.crt:ro,z
    depends_on:
      nexus:
        condition: service_healthy

volumes:
  nexus-data:
    name: hermeto-nexus-data
